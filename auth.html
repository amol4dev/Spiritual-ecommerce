<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antara Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
      color: #0f172a;
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 980px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
    }

    .auth-visual {
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .auth-visual h1 {
      font-size: 32px;
      margin: 0;
      line-height: 1.2;
    }

    .auth-visual p {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.95;
    }

    .auth-form-panel {
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }

    .auth-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .switch-btn {
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #0f172a;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .form-group input {
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      outline: none;
      font-size: 14px;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .auth-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      margin-bottom: 18px;
      font-size: 13px;
    }

    .link-btn {
      color: #2563eb;
      font-weight: 600;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .btn-auth {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .btn-primary-auth {
      background: #2563eb;
      color: white;
      border: none;
    }

    .btn-secondary-auth {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #64748b;
      font-size: 13px;
      margin: 12px 0 16px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .admin-pill {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }

    .hidden { display: none; }

    @media (max-width: 860px) {
      .auth-card { grid-template-columns: 1fr; }
      .auth-visual { order: 2; }
      .auth-form-panel { order: 1; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-visual">
        <div class="admin-pill">🔐 Secure admin access</div>
        <h1>Manage your store with clarity and confidence.</h1>
        <p>Create an account or sign in to start managing products, inventory, and orders from one polished dashboard.</p>
      </div>

      <div class="auth-form-panel">
        <div class="auth-header">
          <h2 id="formTitle">Create account</h2>
          <button class="switch-btn" id="toggleMode">Login instead</button>
        </div>

        <form id="signupForm">
          <div class="form-group">
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Alicia Moore" />
          </div>
          <div class="form-group">
            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="Enter your email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" />
          </div>
          <button class="btn btn-primary btn-auth btn-primary-auth" type="submit">Create account</button>
        </form>

        <form id="loginForm" class="hidden">
          <div class="form-group">
            <label for="loginEmail">Email addresses</label>
            <input id="loginEmail" type="email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="••••••••" />
          </div>
          <div class="auth-actions">
            <label><input type="checkbox" /> Remember me</label>
            <button class="link-btn" type="button">Forgot password?</button>
          </div>
          <button class="btn btn-primary btn-auth btn-primary-auth" type="submit">Sign in</button>
          <button class="btn btn-secondary btn-auth btn-secondary-auth" id="adminLoginBtn" type="button">Login as Admin</button>
        </form>

        <div class="divider">or continue with</div>
        <button class="btn btn-secondary btn-auth btn-secondary-auth" type="button">Continue with Google</button>
      </div>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const loginForm = document.getElementById('loginForm');
    const formTitle = document.getElementById('formTitle');
    const toggleMode = document.getElementById('toggleMode');
    const adminLoginBtn = document.getElementById('adminLoginBtn');

    let isLogin = false;

    toggleMode.addEventListener('click', () => {
      isLogin = !isLogin;
      signupForm.classList.toggle('hidden', isLogin);
      loginForm.classList.toggle('hidden', !isLogin);
      formTitle.textContent = isLogin ? 'Welcome back' : 'Create account';
      toggleMode.textContent = isLogin ? 'Create account' : 'Login instead';
    });

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      // notify parent to navigate top-level (if embedded)
      if(window.parent && window.parent !== window){
        try{ window.parent.postMessage(JSON.stringify({ navigate: 'admin-dashboard.html' }), '*'); }catch(e){}
      } else {
        window.location.href = 'admin-dashboard.html';
      }
    });

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if(window.parent && window.parent !== window){
        try{ window.parent.postMessage(JSON.stringify({ navigate: 'admin-dashboard.html' }), '*'); }catch(e){}
      } else {
        window.location.href = 'admin-dashboard.html';
      }
    });

    adminLoginBtn.addEventListener('click', () => {
      document.getElementById('loginEmail').value = 'admin@antara.com';
      document.getElementById('loginPassword').value = 'admin123';
      if(window.parent && window.parent !== window){
        try{ window.parent.postMessage(JSON.stringify({ navigate: 'admin-dashboard.html' }), '*'); }catch(e){}
      } else {
        window.location.href = 'admin-dashboard.html';
      }
    });
  </script>
</body>
</html>
